<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROFILE | NOSHITA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cursor"></div>
 <nav>
  <div class="logo">NOSHITA.</div>
  <ul class="nav-menu">
    <li><a href="index.html">TOP</a></li>
    <li><a href="portfolio.html">PORTFOLIO</a></li>
    <li><a href="profile.html">PROFILE</a></li>
    <li><a href="service.html">SERVICE</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

  <main>
    <section class="profile-wrap">
      <div class="profile-img">
        <img src="images/profile.jpg" alt="YUMA NOSHITA">
      </div>
      <div class="profile-text">
        <h1 class="profile-name">YUMA NOSHITA<span>野下 侑真</span></h1>
        <p class="profile-bio">
          幼少期から祖父の影響でカメラが身近にあった。<br>
          2021年、大学を卒業後、撮影活動を開始。<br><br>
          九州を拠点に、フォトグラファー・映像作家として活動しながら、<br>
          ギャラリー運営と作家支援を通じて「残すこと」に向き合っている。
        </p>
        <p class="profile-motto">
          僕らは共有できる。記憶よりも鮮明な記録で。
        </p>
      </div>
    </section>
  </main>
<script>
  const cursor = document.querySelector('.cursor');

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX - 10 + 'px';
    cursor.style.top = e.clientY - 10 + 'px';
  });

  document.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1';
  });

  document.addEventListener('mouseleave', () => {
    cursor.style.opacity = '0';
  });
  const hamburger = document.getElementById('hamburger');
const navMenu = document.querySelector('.nav-menu');

hamburger.addEventListener('click', () => {
  navMenu.classList.toggle('active');
});
</script>
</body>
</html>
