<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | NOSHITA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cursor"></div>
 <nav>
  <div class="logo">NOSHITA.</div>
  <ul class="nav-menu">
    <li><a href="index.html">TOP</a></li>
    <li><a href="portfolio.html">PORTFOLIO</a></li>
    <li><a href="profile.html">PROFILE</a></li>
    <li><a href="service.html">SERVICE</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

  <main>
    <section class="contact-hero">
      <h1>CONTACT</h1>
      <p>お気軽にご連絡ください。</p>
    </section>

    <section class="contact-form">
      <form action="https://formspree.io/f/YOUR_ID" method="POST">
        <div class="form-group">
            <div class="form-group">
  <label>撮影プラン（複数選択可）</label>
  <div class="checkbox-group">
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="ウェディング"> ウェディング
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="クライアントワーク"> クライアントワーク
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="ポートフォリオ"> ポートフォリオ
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="七五三"> 七五三
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="日常撮影"> 日常撮影
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="スタジオ撮影"> スタジオ撮影
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="ペット撮影"> ペット撮影
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="アーティスト向けプラン"> アーティスト向けプラン
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="plan" value="その他"> その他
    </label>
  </div>
</div>

<div class="form-group">
  <label>撮影希望日</label>
  <input type="date" name="date">
</div>
          <label>お名前</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>件名</label>
          <input type="text" name="subject">
        </div>
        <div class="form-group">
          <label>メッセージ</label>
          <textarea name="message" rows="8" required></textarea>
        </div>
        <button type="submit">送信する</button>
      </form>
    </section>
  </main>
<script>
  const cursor = document.querySelector('.cursor');

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX - 10 + 'px';
    cursor.style.top = e.clientY - 10 + 'px';
  });

  document.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1';
  });

  document.addEventListener('mouseleave', () => {
    cursor.style.opacity = '0';
  });
  const hamburger = document.getElementById('hamburger');
const navMenu = document.querySelector('.nav-menu');

hamburger.addEventListener('click', () => {
  navMenu.classList.toggle('active');
});
</script>
</body>
</html>
